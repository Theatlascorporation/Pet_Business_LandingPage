<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0b1e35"/>

  <!-- Decorative circles -->
  <circle cx="980" cy="80"  r="380" fill="#c49a3c" opacity="0.055"/>
  <circle cx="140" cy="560" r="260" fill="#4a90d9" opacity="0.045"/>

  <!-- Grid dots -->
  <defs>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.07)"/>
    </pattern>
    <radialGradient id="fade" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="black" stop-opacity="1"/>
      <stop offset="100%" stop-color="black" stop-opacity="0"/>
    </radialGradient>
    <mask id="dotsMask">
      <rect width="1200" height="630" fill="url(#fade)"/>
    </mask>
  </defs>
  <rect width="1200" height="630" fill="url(#dots)" mask="url(#dotsMask)"/>

  <!-- Paw icon -->
  <g transform="translate(80, 190)">
    <circle cx="55"  cy="44"  r="22" fill="#c49a3c"/>
    <circle cx="145" cy="44"  r="22" fill="#c49a3c"/>
    <circle cx="24"  cy="96"  r="18" fill="#c49a3c"/>
    <circle cx="176" cy="96"  r="18" fill="#c49a3c"/>
    <path d="M32,132 Q100,196 168,132 Q130,90 100,104 Q70,90 32,132Z" fill="#c49a3c"/>
  </g>

  <!-- Brand text -->
  <text x="270" y="290" font-family="Georgia, serif" font-size="80" font-weight="700" fill="#ffffff" letter-spacing="-1">PawVita</text>
  <text x="270" y="370" font-family="Georgia, serif" font-size="80" font-weight="700" fill="#c49a3c" letter-spacing="-1">Care</text>

  <!-- Tagline -->
  <text x="270" y="430" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="rgba(255,255,255,0.55)" letter-spacing="0.5">Premium Pet Clinic  ·  Luxury Grooming  ·  Pet Marketing</text>

  <!-- Divider -->
  <line x1="270" y1="470" x2="920" y2="470" stroke="rgba(196,154,60,0.30)" stroke-width="1"/>

  <!-- URL -->
  <text x="270" y="508" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="rgba(255,255,255,0.30)">www.pawvitacare.com</text>
</svg>
